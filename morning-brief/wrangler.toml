name = "morning-brief"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Keep the Worker private — reachable only through the aventary.com routes
# below, not via a public workers.dev subdomain.
workers_dev = false
preview_urls = false

# ─── Observability ───────────────────────────────────────────────────────────
# Persist invocation logs so silent cron failures are diagnosable after the fact.
[observability]
enabled = true
head_sampling_rate = 1

# ─── Cron Trigger ────────────────────────────────────────────────────────────
# 6 AM PDT (Apr–Oct) = 13:00 UTC
# Change to "0 14 * * *" Nov–Mar (PST = UTC-8)
[triggers]
crons = ["0 13 * * *"]

# ─── KV Namespace ────────────────────────────────────────────────────────────
# Create with: wrangler kv:namespace create BRIEF_KV
# Then paste the returned id below
[[kv_namespaces]]
binding = "BRIEF_KV"
id = "916e2964d8ad49db93b8d663869c0a9f"

# ─── Secrets (set via CLI, never commit these) ───────────────────────────────
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put TRIGGER_SECRET      ← any random string you choose

# ─── Routes ──────────────────────────────────────────────────────────────────
# Mounts the Worker same-origin under aventary.com so the /intelligence page
# can fetch /api/morning-brief without CORS. Requires aventary.com to be on
# Cloudflare DNS (it is — Pages requires it too).
#
# Trailing `*` is important: exact-match patterns dropped requests that
# included query strings (e.g. ?force=1) and let them fall through to Pages.
[[routes]]
pattern = "aventary.com/api/morning-brief*"
zone_name = "aventary.com"

[[routes]]
pattern = "aventary.com/api/trigger*"
zone_name = "aventary.com"

# Also claim the www host. The site is served on both aventary.com and
# www.aventary.com; without these routes, a brief fetch from www falls through
# to the Next app and 404s. (The app also 301s www → apex, so this is belt-and
# -suspenders for any direct www API hit.) Trailing `*` as above.
[[routes]]
pattern = "www.aventary.com/api/morning-brief*"
zone_name = "aventary.com"

[[routes]]
pattern = "www.aventary.com/api/trigger*"
zone_name = "aventary.com"
